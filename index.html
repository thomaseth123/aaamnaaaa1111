<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Birthday Surprise | For Someone Special</title>
    <link

        rel="stylesheet">
    <style>
        :root {
            --accent: #ff2d55;
            --accent-glow: rgba(255, 45, 85, 0.5);
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0a0a0b;
            --royal-red: #6e0000;
            --bulb-warm: #ffde6b;
            --bulb-glow: rgba(255, 222, 107, 0.8);
        }

        /* --- Layout Fixes --- */
        html, body {
            margin: 0; padding: 0;
            overflow-x: hidden; width: 100%; height: 100%;
            background-color: var(--bg-dark);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body { font-family: 'Montserrat', sans-serif; color: white; perspective: 1000px; }

        .page {
            position: absolute; top: 0; left: 0;
            width: 100vw; min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; text-align: center;
            visibility: hidden; opacity: 0;
            transform: scale(1.1) translateZ(0);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1; overflow: hidden;
        }

        .page.active { visibility: visible; opacity: 1; transform: scale(1) translateZ(0); z-index: 10; }

        @keyframes floatHeart {
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent); }
            50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
            100% { box-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent); }
        }

        /* --- Hero Page --- */
        #hero-page { background: radial-gradient(circle at center, #1a0a0c 0%, #050505 100%); }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 900; font-style: italic;
            background: linear-gradient(to right, #fff, #ff2d55, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .btn-neon {
            position: relative; padding: 18px 45px;
            font-size: 1.1rem; font-weight: 600; color: white;
            background: transparent; border: 1px solid var(--accent);
            border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px;
            overflow: hidden; transition: 0.5s;
            animation: neonPulse 2s infinite;
        }

        /* --- Slider Message --- */
        .slider-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 60px 40px; border-radius: 40px;
            border: 1px solid var(--glass-border); max-width: 500px;
            width: 90%; position: relative;
        }

        .step-content { display: none; min-height: 120px; align-items: center; justify-content: center; animation: fadeInScale 0.8s forwards; }
        .step-content.active { display: flex; flex-direction: column; }

        /* --- Celebration Page --- */
        #celebration-page { background: #000; transition: background 2s ease; }
        #celebration-page.bright { background: radial-gradient(circle at center, #2a0a0e 0%, #0a0a0b 100%); }
